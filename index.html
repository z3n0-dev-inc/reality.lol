<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>void.bio — Profile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── load custom bg image if set ── */
        #custom-bg-img {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            display: none; pointer-events: none;
        }

        /* ── customize button in dock ── */
        #customize-btn {
            position: fixed;
            bottom: calc(50% - 280px - 10px);
            right: 20px;
            z-index: 25;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s;
            letter-spacing: 1px;
            text-decoration: none;
            display: none;
        }
        #customize-btn:hover {
            border-color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.9);
        }

        @media (max-width: 768px) {
            #customize-btn {
                bottom: calc(50% - 200px - 10px);
                right: 10px;
                font-size: 10px;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body class="home-theme" onload="initMedia()">

    <!-- Custom cursor -->
    <div class="custom-cursor"></div>

    <!-- Custom background image (set via customize page) -->
    <img id="custom-bg-img" alt="">

    <!-- Start screen -->
    <div id="start-screen">
        <div id="start-text"></div>
    </div>

    <div class="container">

        <!-- Default video background -->
        <video id="background" autoplay loop muted playsinline webkit-playsinline>
            <source src="background.mp4" type="video/mp4">
        </video>

        <!-- Overlays -->
        <div class="glitch-overlay"></div>
        <div id="hacker-overlay" class="hidden"></div>
        <div id="snow-overlay" class="hidden"></div>

        <!-- Profile block -->
        <div id="profile-block" class="hidden">
            <div class="profile-header">
                <div class="profile-container">
                    <img src="profile.gif" alt="Profile" class="profile-picture" id="profile-picture-img">
                </div>
                <div class="profile-info">
                    <div class="name-and-badges">
                        <div id="profile-name"></div>
                        <div class="badge-box">
                            <div class="badge-box-inner">
                                <div class="badge-group" id="badge-group">
                                    <!-- badges injected by JS from customization -->
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="profile-bio"></div>
                </div>
            </div>

            <div class="bio-separator"></div>

            <div class="profile-footer">
                <div class="social-links" id="social-links-container">
                    <!-- socials injected by JS from customization -->
                </div>

                <div class="visitor-counter">
                    <svg class="visitor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                    <span id="visitor-count">0</span>
                    <span class="tooltip">Profile Views</span>
                </div>
            </div>
        </div>

        <!-- Skills block -->
        <div id="skills-block" class="hidden">
            <h2 class="skills-title">Programming Skills</h2>
            <div id="skills-container">
                <!-- skills injected by JS from customization -->
            </div>
        </div>

        <!-- Results button (hacker theme) -->
        <div id="results-button-container" class="hidden">
            <button id="results-theme">View Results</button>
            <div id="results-hint" class="hidden">Click again to return to profile</div>
        </div>

        <!-- Theme buttons -->
        <div class="controls">
            <div id="home-theme"   class="theme-button">1</div>
            <div id="hacker-theme" class="theme-button">2</div>
            <div id="rain-theme"   class="theme-button">3</div>
            <div id="anime-theme"  class="theme-button">4</div>
            <div id="car-theme"    class="theme-button">5</div>
        </div>

        <!-- Volume + transparency controls -->
        <div class="top-controls">
            <div class="volume-control">
                <svg id="volume-icon" class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
                </svg>
                <input id="volume-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.3">
            </div>
            <div class="transparency-control">
                <svg class="transparency-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                <input id="transparency-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.7">
            </div>
        </div>

    </div><!-- /container -->

    <!-- Customize button (shows after start screen) -->
    <a id="customize-btn" href="customize.html">✦ Customize</a>

    <!-- Audio -->
    <audio id="background-music" loop>
        <source src="background_music.mp3" type="audio/mp3">
    </audio>
    <audio id="hacker-music" loop muted>
        <source src="hacker_music.mp3" type="audio/mp3">
    </audio>
    <audio id="rain-music" loop muted>
        <source src="rain_music.mp3" type="audio/mp3">
    </audio>
    <audio id="anime-music" loop muted>
        <source src="anime_music.mp3" type="audio/mp3">
    </audio>
    <audio id="car-music" loop muted>
        <source src="car_music.mp3" type="audio/mp3">
    </audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <!-- ── CUSTOMIZATION LOADER ── runs before script.js so values are ready ── -->
    <script>
    (function() {
        const C = JSON.parse(localStorage.getItem('void_custom') || '{}');
        const SOCIAL_ICONS = {
            Discord:'💬', GitHub:'⬡', YouTube:'▶', TikTok:'♪',
            'Twitter/X':'✕', Instagram:'📷', Twitch:'🟣',
            Steam:'🎮', Spotify:'🎵', Website:'🌐'
        };

        // ── Name & bio (override what script.js would type) ──────────────────
        if (C.name) window.__VOID_NAME__ = C.name;
        if (C.bio)  window.__VOID_BIO__  = C.bio;

        // ── Avatar ────────────────────────────────────────────────────────────
        const pic = document.getElementById('profile-picture-img');
        if (C.avatarData) {
            pic.src = C.avatarData;
        } else if (C.avatar) {
            pic.src = C.avatar;
        }

        // ── Custom background image/video ─────────────────────────────────────
        if (C.bgImage) {
            const bgEl = document.getElementById('custom-bg-img');
            const isVideo = C.bgImage.startsWith('data:video');
            if (isVideo) {
                // replace img with video element
                const vid = document.createElement('video');
                vid.autoplay = true; vid.loop = true; vid.muted = true; vid.playsInline = true;
                vid.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;pointer-events:none;';
                vid.src = C.bgImage;
                document.body.insertBefore(vid, bgEl);
                bgEl.remove();
                // hide default video
                const defVid = document.getElementById('background');
                if(defVid) defVid.style.display = 'none';
            } else {
                bgEl.src = C.bgImage;
                bgEl.style.display = 'block';
                // hide default video
                const defVid = document.getElementById('background');
                if(defVid) defVid.style.display = 'none';
            }
        }

        // ── Custom music ──────────────────────────────────────────────────────
        if (C.musicUrl) {
            const audio = document.getElementById('background-music');
            audio.innerHTML = `<source src="${C.musicUrl}" type="audio/mp3">`;
        }

        // ── Start text ────────────────────────────────────────────────────────
        if (C.startText) window.__VOID_START_TEXT__ = C.startText;

        // ── Theme colors ──────────────────────────────────────────────────────
        if (C.primaryColor)   document.documentElement.style.setProperty('--primary-color',   C.primaryColor);
        if (C.secondaryColor) document.documentElement.style.setProperty('--secondary-color', C.secondaryColor);

        // ── Badges ────────────────────────────────────────────────────────────
        const badgeGroup = document.getElementById('badge-group');
        if (badgeGroup && C.badges && C.badges.length) {
            badgeGroup.innerHTML = '';
            C.badges.forEach(b => {
                const wrap = document.createElement('div');
                wrap.className = 'badge-container';
                wrap.innerHTML = `<span style="font-size:20px;cursor:default;">${b.emoji}</span><span class="tooltip">${b.tip||''}</span>`;
                badgeGroup.appendChild(wrap);
            });
        }

        // ── Socials ───────────────────────────────────────────────────────────
        const socialCont = document.getElementById('social-links-container');
        if (socialCont && C.socials && C.socials.length) {
            socialCont.innerHTML = '';
            C.socials.forEach(s => {
                if (!s.href || s.href === '#') return;
                const icon = SOCIAL_ICONS[s.platform] || '🔗';
                const a = document.createElement('a');
                a.href = s.href; a.target = '_blank';
                a.style.cssText = 'display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;text-decoration:none;font-size:12px;transition:all 0.2s;';
                a.innerHTML = `<span>${icon}</span><span>${s.platform}</span>`;
                a.onmouseover = () => a.style.background='rgba(255,255,255,0.2)';
                a.onmouseout  = () => a.style.background='rgba(255,255,255,0.1)';
                socialCont.appendChild(a);
            });
        }

        // ── Skills ────────────────────────────────────────────────────────────
        const skillsCont = document.getElementById('skills-container');
        if (skillsCont && C.skills && C.skills.length) {
            skillsCont.innerHTML = '';
            const colors = [
                'linear-gradient(90deg,#ff6b6b,#ff9f9f)',
                'linear-gradient(90deg,#4facfe,#00f2fe)',
                'linear-gradient(90deg,#43e97b,#38f9d7)',
                'linear-gradient(90deg,#fa709a,#fee140)',
                'linear-gradient(90deg,#a18cd1,#fbc2eb)',
            ];
            C.skills.forEach((sk, i) => {
                const div = document.createElement('div');
                div.className = 'skill';
                const barId = `custom-bar-${i}`;
                div.innerHTML = `
                    <div class="skill-name">
                        <span>${sk.name}</span>
                        <span>${sk.pct}%</span>
                    </div>
                    <div class="skill-bar-container">
                        <div id="${barId}" class="skill-bar" style="background:${colors[i%colors.length]};"></div>
                    </div>`;
                skillsCont.appendChild(div);
                // animate bar when shown
                setTimeout(() => {
                    const bar = document.getElementById(barId);
                    if(bar) bar.style.width = sk.pct + '%';
                }, 600 + i * 100);
            });

            // patch script.js bar animations to also handle custom bars
            window.__VOID_CUSTOM_SKILLS__ = C.skills;
        }

    })();
    </script>

    <!-- Your original script.js — patched to respect custom name/bio/start text -->
    <script>
    // Patch script.js name, bio, start text before it loads
    (function() {
        // Override bio messages if custom bio set
        if (window.__VOID_BIO__) {
            window.__VOID_BIO_OVERRIDE__ = true;
        }
    })();
    </script>
    <script src="script.js"></script>

    <!-- Post-patch: override name/bio/start text after script.js runs its typewriters -->
    <script>
    (function() {
        const C = JSON.parse(localStorage.getItem('void_custom') || '{}');

        // Show customize button after start screen is clicked
        const startScreen = document.getElementById('start-screen');
        const custBtn = document.getElementById('customize-btn');
        if (startScreen && custBtn) {
            const orig = startScreen.onclick;
            const observer = new MutationObserver(() => {
                if (startScreen.classList.contains('hidden') || startScreen.style.display === 'none') {
                    custBtn.style.display = 'block';
                }
            });
            observer.observe(startScreen, { attributes: true, attributeFilter: ['class', 'style'] });
        }

        // Patch the name typewriter to use custom name
        if (C.name && C.name.trim()) {
            const nameEl = document.getElementById('profile-name');
            // wait a tick so script.js sets up its interval, then override
            setTimeout(() => {
                // override the name variable script.js uses
                const fullName = C.name.toUpperCase();
                let idx = 0;
                nameEl.textContent = '';
                function typeIt() {
                    if (idx <= fullName.length) {
                        nameEl.textContent = fullName.slice(0, idx) + (idx < fullName.length ? '|' : '');
                        idx++;
                        setTimeout(typeIt, 120);
                    }
                }
                // Only run after start screen dismissed
                const waitForStart = setInterval(() => {
                    if (!document.getElementById('start-screen') || document.getElementById('start-screen').classList.contains('hidden')) {
                        clearInterval(waitForStart);
                        typeIt();
                    }
                }, 200);
            }, 100);
        }

        // Patch bio typewriter to use custom bio
        if (C.bio && C.bio.trim()) {
            const bioEl = document.getElementById('profile-bio');
            setTimeout(() => {
                const waitForStart = setInterval(() => {
                    if (!document.getElementById('start-screen') || document.getElementById('start-screen').classList.contains('hidden')) {
                        clearInterval(waitForStart);
                        setTimeout(() => {
                            let idx = 0;
                            const bio = C.bio;
                            function typeBio() {
                                if (idx <= bio.length) {
                                    bioEl.textContent = bio.slice(0, idx) + (idx < bio.length ? '|' : '');
                                    idx++;
                                    setTimeout(typeBio, 40);
                                }
                            }
                            typeBio();
                        }, 400);
                    }
                }, 200);
            }, 100);
        }

        // Patch start screen text
        if (C.startText) {
            const startTextEl = document.getElementById('start-text');
            if (startTextEl) {
                // Wait a tick for script.js to set it then override
                setTimeout(() => {
                    startTextEl.textContent = C.startText;
                }, 50);
            }
        }

        // Apply custom theme colors
        if (C.primaryColor) {
            document.documentElement.style.setProperty('--primary-color', C.primaryColor);
        }
        if (C.secondaryColor) {
            document.documentElement.style.setProperty('--secondary-color', C.secondaryColor);
        }
    })();
    </script>

</body>
</html>
